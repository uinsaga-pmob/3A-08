name: kopi_sruput
description: Aplikasi pemesanan kopi untuk mahasiswa
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  
  # Image & Media
  image_picker: ^1.1.2
  
  # State Management
  provider: ^6.1.2
  
  # Utilities - HAPUS shared_preferences jika error
  # shared_preferences: ^2.3.2  # ← COMMENT dulu untuk testing
  
  # UI
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/